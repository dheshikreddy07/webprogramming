



<!DOCTYPE html>
<html>
<head>
    <title>Book Explorer</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 30px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            border: 1px solid gray;
            padding: 10px;
            width: 200px;
            text-align: left;
        }

        .card img {
            width: 100%;
            height: 250px;
        }
    </style>
</head>

<body>

    <h2>C. DHESHIK REDDY</h2>
    <h3>REG NO: 24BCT0238</h3>

    <h1>Book Explorer</h1>

    <input type="text" id="search" placeholder="Enter book name">
    <button onclick="searchBooks()">Search</button>

    <div class="container" id="results"></div>

    <script>
        async function searchBooks() {
            let query = document.getElementById("search").value;

            if (query === "") {
                alert("Enter book name");
                return;
            }

            let url = `https://www.googleapis.com/books/v1/volumes?q=${query}`;

            let response = await fetch(url);
            let data = await response.json();

            let output = "";

            data.items.forEach(book => {
                let info = book.volumeInfo;

                output += `
                    <div class="card">
                        <img src="${info.imageLinks ? info.imageLinks.thumbnail : ''}">
                        <h3>${info.title}</h3>
                        <p><b>Author:</b> ${info.authors ? info.authors[0] : 'N/A'}</p>
                        <p><b>Publisher:</b> ${info.publisher || 'N/A'}</p>
                        <p><b>Year:</b> ${info.publishedDate || 'N/A'}</p>
                    </div>
                `;
            });

            document.getElementById("results").innerHTML = output;
        }
    </script>

</body>
</html>
