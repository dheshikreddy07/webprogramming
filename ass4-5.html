

<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            margin-left: 5px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: lightgray;
            margin: 5px auto;
            padding: 8px;
            width: 250px;
        }
    </style>
</head>

<body>

    <h2>C. DHESHIK REDDY</h2>
    <h3>REG NO: 24BCT0238</h3>

    <h1>To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>

    <script>
        function addTask() {
            let task = document.getElementById("taskInput").value;

            if (task === "") {
                alert("Please enter a task");
                return;
            }

            let li = document.createElement("li");
            li.textContent = task;

            document.getElementById("taskList").appendChild(li);

            document.getElementById("taskInput").value = "";
        }
    </script>

</body>
</html>
